name: Run Keells Scraper

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Debug - list files and show scraper.py
        run: |
          ls -la
          echo "=== First 20 lines of scraper.py ==="
          head -20 scraper.py
      
      - name: Test environment variable
        run: |
          echo "GOOGLE_SHEET_ID is set to: ${{ secrets.GOOGLE_SHEET_ID }}"
      
      - name: Run scraper with verbose output
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python -u scraper.py 2>&1